<!DOCTYPE html>
<html>
<head>
    <title>Fix Workspace - Bizaxl Finance</title>
    <meta http-equiv="refresh" content="2;url=/app/workspace/Bizaxl%20Finance">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a5f2a 0%, #2e7d32 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2e7d32;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            color: #666;
            font-size: 16px;
        }
        .success {
            color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fixing Workspace...</h1>
        <div class="spinner"></div>
        <p>Please wait while we restore your Bizaxl Finance workspace...</p>
        <p class="success">Redirecting to workspace...</p>
    </div>
    
    <script>
        // Auto-trigger API call
        fetch('/api/method/bizaxl_finance.www.fix_workspace.fix')
            .then(r => r.json())
            .then(d => {
                console.log('Workspace fix result:', d);
            })
            .catch(e => console.error('Error:', e));
    </script>
</body>
</html>
